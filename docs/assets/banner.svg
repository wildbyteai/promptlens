<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PromptLens banner</title>
  <desc id="desc">A clean banner showing a lens turning a web image into structured prompt cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#f3f0ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#27231f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="34" fill="url(#bg)"/>
  <circle cx="156" cy="160" r="57" fill="#111827"/>
  <circle cx="156" cy="160" r="43" fill="#252b3a" stroke="#818cf8" stroke-width="5"/>
  <circle cx="156" cy="160" r="25" fill="#111827" stroke="#4f46e5" stroke-width="2"/>
  <circle cx="174" cy="140" r="10" fill="#ffffff" fill-opacity="0.82"/>
